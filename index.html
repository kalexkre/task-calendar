<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Task Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ff;
    --card: #ffffff;
    --primary: #5b4ef8;
    --primary-light: #ede9ff;
    --primary-mid: #c4b8ff;
    --accent: #ff6b6b;
    --green: #22c55e;
    --text: #1a1830;
    --muted: #8b87a8;
    --border: #e8e5f7;
    --shadow: 0 4px 24px rgba(91,78,248,0.10);
    --radius: 16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 0;
  }

  /* ── DESKTOP: side by side ── */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    min-height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* LEFT PANEL */
  .calendar-col {
    background: var(--card);
    border-right: 1.5px solid var(--border);
    padding: 28px 20px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  /* RIGHT PANEL */
  .task-col {
    padding: 28px 24px;
    overflow-y: auto;
  }

  /* ── MOBILE: stacked ── */
  @media (max-width: 700px) {
    .app {
      grid-template-columns: 1fr;
      min-height: unset;
    }
    .calendar-col {
      position: static;
      height: auto;
      border-right: none;
      border-bottom: 1.5px solid var(--border);
      padding: 16px 14px 12px;
    }
    .task-col {
      padding: 16px 14px;
    }
  }

  /* ── CALENDAR ── */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--text);
  }
  .cal-title span { color: var(--primary); }
  .cal-nav { display: flex; align-items: center; gap: 6px; }
  .nav-btn {
    width: 30px; height: 30px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 1rem;
    transition: all .15s;
  }
  .nav-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary-mid); }
  .today-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
    transition: all .15s;
  }
  .today-btn:hover { background: var(--primary-light); border-color: var(--primary-mid); color: var(--primary); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
  }
  .cal-dow {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 8px;
  }
  .cal-day {
    text-align: center;
    padding: 7px 2px;
    font-size: 0.85rem;
    border-radius: 9px;
    cursor: pointer;
    color: var(--text);
    position: relative;
    transition: all .15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-day:hover { background: var(--primary-light); color: var(--primary); }
  .cal-day.other-month { color: #ccc; }
  .cal-day.selected {
    background: var(--primary);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 3px 10px rgba(91,78,248,0.35);
  }
  .cal-day.has-tasks::after {
    content: '';
    display: block;
    width: 4px; height: 4px;
    background: var(--primary);
    border-radius: 50%;
    margin: 1px auto 0;
  }
  .cal-day.selected.has-tasks::after { background: rgba(255,255,255,0.7); }

  @media (max-width: 700px) {
    .cal-day { padding: 8px 2px; font-size: 0.88rem; }
  }

  /* ── TASK SECTION ── */
  .task-date-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
  }
  .task-date-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--text);
  }
  .task-today-badge {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--primary);
    font-style: italic;
  }
  .add-task-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }
  .add-task-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--card);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    padding: 0 12px;
    box-shadow: 0 2px 8px rgba(91,78,248,0.06);
    transition: border-color .15s;
  }
  .add-task-wrap:focus-within { border-color: var(--primary-mid); }
  .add-task-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: transparent;
    padding: 12px 0;
  }
  .add-task-input::placeholder { color: var(--muted); }
  .dot-btn {
    width: 12px; height: 12px;
    background: var(--primary);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    opacity: 0.6;
  }
  .add-btn {
    width: 44px; height: 44px;
    background: var(--primary);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(91,78,248,0.35);
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .filter-tabs { display: flex; gap: 4px; }
  .filter-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-tab.active { background: var(--primary-light); color: var(--primary); }
  .clear-btn {
    font-size: 0.78rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── TASKS ── */
  .tasks-list { display: flex; flex-direction: column; gap: 5px; }
  .task-item {
    background: var(--card);
    border-radius: 10px;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity .2s;
  }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-name { text-decoration: line-through; color: var(--muted); }

  .check-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
    font-size: 0.72rem;
    -webkit-tap-highlight-color: transparent;
  }
  .check-btn.checked { background: var(--green); border-color: var(--green); color: #fff; }

  .task-body { flex: 1; min-width: 0; }
  .task-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-meta { display: flex; align-items: center; gap: 5px; }
  .priority-badge {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 5px;
  }
  .priority-badge.low { background: #e0f2fe; color: #0369a1; }
  .priority-badge.medium { background: #fef9c3; color: #a16207; }
  .priority-badge.high { background: #fee2e2; color: #dc2626; }
  .task-attachments-count { font-size: 0.7rem; color: var(--muted); }

  .task-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    color: var(--muted);
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:hover, .icon-btn:active { background: var(--primary-light); color: var(--primary); }
  .icon-btn.delete:hover, .icon-btn.delete:active { background: #fee2e2; color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 28px 16px;
    color: var(--muted);
    font-size: 0.88rem;
    background: var(--card);
    border-radius: 12px;
    border: 1.5px dashed var(--border);
  }
  .empty-state .emoji { font-size: 1.8rem; display: block; margin-bottom: 6px; }

  /* ── MODALS ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,24,48,0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 -8px 40px rgba(91,78,248,0.15);
    transform: translateY(40px);
    transition: transform .25s cubic-bezier(.2,.8,.3,1);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  /* pill handle */
  .modal::before {
    content: '';
    display: block;
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  @media (min-width: 701px) {
    .modal-overlay { align-items: center; padding: 20px; }
    .modal { border-radius: 20px; max-width: 420px; }
    .modal::before { display: none; }
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 18px;
  }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .form-input, .form-select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--primary-mid); }

  .attach-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.85rem;
    background: var(--bg);
  }
  .attach-zone input { display: none; }
  .attach-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .attach-preview {
    position: relative;
    width: 58px; height: 58px;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid var(--border);
  }
  .attach-preview img { width: 100%; height: 100%; object-fit: cover; }
  .attach-preview .remove-attach {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px;
    background: rgba(0,0,0,0.55);
    border: none; border-radius: 50%;
    color: #fff; font-size: 0.6rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .attach-file-item {
    display: flex; align-items: center; gap: 5px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 0.76rem;
    color: var(--text);
  }
  .attach-file-item button { background: none; border: none; cursor: pointer; color: var(--muted); }

  .modal-footer { display: flex; gap: 10px; margin-top: 18px; }
  .btn-cancel {
    flex: 1; padding: 12px;
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
  }
  .btn-primary {
    flex: 2; padding: 12px;
    border: none;
    background: var(--primary);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(91,78,248,0.3);
  }

  /* Move calendar */
  .move-cal { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-top: 8px; }
  .move-cal-dow { text-align: center; font-size: 0.62rem; font-weight: 700; color: var(--muted); text-transform: uppercase; padding-bottom: 5px; }
  .move-cal-day {
    text-align: center; padding: 8px 2px; font-size: 0.82rem;
    border-radius: 8px; cursor: pointer; color: var(--text);
    transition: all .15s;
  }
  .move-cal-day:hover { background: var(--primary-light); color: var(--primary); }
  .move-cal-day.disabled { color: #d0cedf; pointer-events: none; }
  .move-cal-day.selected-move { background: var(--primary); color: #fff; }

  /* Attachment gallery */
  .attach-gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .attach-gallery-item { border-radius: 10px; overflow: hidden; border: 1.5px solid var(--border); }
  .attach-gallery-item img { display: block; max-width: 140px; max-height: 120px; object-fit: cover; }
  .attach-gallery-item .file-label { padding: 8px 12px; font-size: 0.8rem; color: var(--text); }

  @keyframes slideUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .task-item { animation: slideUp .18s ease; }
</style>
</head>
<body>
<div class="app">

  <!-- LEFT / TOP: CALENDAR -->
  <div class="calendar-col">
    <div class="cal-header">
      <button class="nav-btn" id="prev-month">&#8249;</button>
      <h2 class="cal-title" id="cal-title"></h2>
      <div class="cal-nav">
        <button class="today-btn" id="go-today">Today</button>
        <button class="nav-btn" id="next-month">&#8250;</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- RIGHT / BOTTOM: TASKS -->
  <div class="task-col">
    <div class="task-date-header">
      <span class="task-date-label" id="task-date-label"></span>
      <span class="task-today-badge" id="today-badge" style="display:none">— Today</span>
    </div>
    <div class="add-task-row">
      <div class="add-task-wrap">
        <input class="add-task-input" id="add-task-input" placeholder="Add a task for this day…" />
        <button class="dot-btn"></button>
      </div>
      <button class="add-btn" id="open-add-modal">+</button>
    </div>
    <div class="filter-row">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="active">Active</button>
        <button class="filter-tab" data-filter="done">Done</button>
      </div>
      <button class="clear-btn" id="clear-done-btn">Clear done</button>
    </div>
    <div class="tasks-list" id="tasks-list"></div>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Task</div>
    <div class="form-group" id="fg-name">
      <label class="form-label">Task name</label>
      <input class="form-input" id="modal-task-name" placeholder="What needs to be done?" />
    </div>
    <div class="form-group" id="fg-priority">
      <label class="form-label">Priority</label>
      <select class="form-select" id="modal-priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Attachments</label>
      <label class="attach-zone">
        <input type="file" id="modal-file-input" multiple accept="image/*,application/pdf,.doc,.docx,.txt" />
        📎 Tap to attach files or screenshots
      </label>
      <div class="attach-previews" id="modal-attach-previews"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-save">Save Task</button>
    </div>
  </div>
</div>

<!-- MOVE TASK MODAL -->
<div class="modal-overlay" id="move-modal">
  <div class="modal">
    <div class="modal-title">Move Task to…</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button class="nav-btn" id="move-prev">&#8249;</button>
      <span style="font-weight:600;color:var(--text);font-size:0.95rem" id="move-month-label"></span>
      <button class="nav-btn" id="move-next">&#8250;</button>
    </div>
    <div class="move-cal" id="move-cal-grid"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="move-cancel">Cancel</button>
      <button class="btn-primary" id="move-confirm">Move Task</button>
    </div>
  </div>
</div>

<!-- ATTACHMENTS VIEW MODAL -->
<div class="modal-overlay" id="attach-modal">
  <div class="modal">
    <div class="modal-title">Attachments</div>
    <div class="attach-gallery" id="attach-gallery"></div>
    <div class="modal-footer">
      <button class="btn-primary" id="attach-close" style="flex:1">Close</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SHORT_DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

const today = new Date();
let viewYear = today.getFullYear(), viewMonth = today.getMonth();
let selectedDate = dateKey(today);
let tasks = JSON.parse(localStorage.getItem('cal_tasks') || '{}');
let filterMode = 'all';
let editingTaskId = null, pendingAttachments = [];
let moveTaskId = null, moveViewYear = today.getFullYear(), moveViewMonth = today.getMonth(), moveSelectedDate = null;

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function saveTasks() { localStorage.setItem('cal_tasks', JSON.stringify(tasks)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function findTask(id) {
  for (const key in tasks) {
    const idx = tasks[key].findIndex(t => t.id === id);
    if (idx !== -1) return { key, idx, task: tasks[key][idx] };
  }
  return null;
}

// ── CALENDAR ──
function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  document.getElementById('cal-title').innerHTML = `${MONTHS[viewMonth].slice(0,3)} <span>${viewYear}</span>`;
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d.slice(0,1);
    grid.appendChild(el);
  });
  const first = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevDays - first + 1 + i;
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    const key = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (key === selectedDate) el.classList.add('selected');
    if (tasks[key] && tasks[key].length) el.classList.add('has-tasks');
    el.addEventListener('click', () => {
      selectedDate = key; renderCalendar(); renderTasks(); updateDateHeader();
    });
    grid.appendChild(el);
  }
  const rem = 42 - first - daysInMonth;
  for (let i = 1; i <= rem; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month'; el.textContent = i;
    grid.appendChild(el);
  }
}

function updateDateHeader() {
  const [y,m,d] = selectedDate.split('-');
  const dt = new Date(+y, +m-1, +d);
  const wd = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()];
  const mn = MONTHS[dt.getMonth()].slice(0,3);
  document.getElementById('task-date-label').textContent = `${wd}, ${mn} ${dt.getDate()}`;
  document.getElementById('today-badge').style.display = selectedDate === dateKey(today) ? '' : 'none';
}

// ── TASKS ──
function getFilteredTasks() {
  const list = tasks[selectedDate] || [];
  if (filterMode === 'active') return list.filter(t => !t.done);
  if (filterMode === 'done') return list.filter(t => t.done);
  return list;
}

function renderTasks() {
  const container = document.getElementById('tasks-list');
  container.innerHTML = '';
  const list = getFilteredTasks();
  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><span class="emoji">✨</span>No tasks for this day</div>`;
    return;
  }
  list.forEach(task => {
    const el = document.createElement('div');
    el.className = 'task-item' + (task.done ? ' done' : '');
    el.innerHTML = `
      <button class="check-btn ${task.done?'checked':''}" data-id="${task.id}">${task.done?'✓':''}</button>
      <div class="task-body">
        <div class="task-name">${escHtml(task.name)}</div>
        <div class="task-meta">
          <span class="priority-badge ${task.priority}">${task.priority.toUpperCase()}</span>
          ${task.attachments&&task.attachments.length?`<span class="task-attachments-count">📎 ${task.attachments.length}</span>`:''}
        </div>
      </div>
      <div class="task-actions">
        ${task.attachments&&task.attachments.length?`<button class="icon-btn" data-action="view-attach" data-id="${task.id}">📎</button>`:''}
        <button class="icon-btn" data-action="attach" data-id="${task.id}">🖇️</button>
        <button class="icon-btn" data-action="move" data-id="${task.id}">📅</button>
        <button class="icon-btn delete" data-action="delete" data-id="${task.id}">✕</button>
      </div>`;
    container.appendChild(el);
  });
}

// ── TASK EVENTS ──
document.getElementById('tasks-list').addEventListener('click', e => {
  const cb = e.target.closest('.check-btn');
  const ib = e.target.closest('.icon-btn[data-action]');
  if (cb) {
    const f = findTask(cb.dataset.id);
    if (f) { f.task.done = !f.task.done; saveTasks(); renderCalendar(); renderTasks(); }
  }
  if (ib) {
    const {id, action} = ib.dataset;
    if (action==='delete') { const f=findTask(id); if(f){tasks[f.key].splice(f.idx,1); saveTasks(); renderCalendar(); renderTasks();} }
    if (action==='move') openMoveModal(id);
    if (action==='attach') openAttachModal(id);
    if (action==='view-attach') openViewAttachModal(id);
  }
});

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); filterMode = btn.dataset.filter; renderTasks();
  });
});
document.getElementById('clear-done-btn').addEventListener('click', () => {
  if (tasks[selectedDate]) { tasks[selectedDate]=tasks[selectedDate].filter(t=>!t.done); saveTasks(); renderCalendar(); renderTasks(); }
});

// ── CALENDAR NAV ──
document.getElementById('prev-month').addEventListener('click', () => {
  viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar();
});
document.getElementById('next-month').addEventListener('click', () => {
  viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar();
});
document.getElementById('go-today').addEventListener('click', () => {
  viewYear=today.getFullYear(); viewMonth=today.getMonth();
  selectedDate=dateKey(today); renderCalendar(); renderTasks(); updateDateHeader();
});

// ── ADD MODAL ──
function resetModal() {
  document.getElementById('fg-name').style.display='';
  document.getElementById('fg-priority').style.display='';
  document.getElementById('modal-title').textContent='New Task';
  editingTaskId=null; pendingAttachments=[];
  document.getElementById('modal-attach-previews').innerHTML='';
}
function openAddModal(prefill='') {
  resetModal();
  document.getElementById('modal-task-name').value=prefill;
  document.getElementById('modal-priority').value='low';
  document.getElementById('task-modal').classList.add('open');
}
document.getElementById('open-add-modal').addEventListener('click', () => openAddModal(document.getElementById('add-task-input').value.trim()));
document.getElementById('add-task-input').addEventListener('keydown', e => {
  if(e.key==='Enter'){const v=e.target.value.trim(); if(v) openAddModal(v);}
});
document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('task-modal').classList.remove('open'); resetModal();
});

function saveTaskFromModal() {
  const nameVisible = document.getElementById('fg-name').style.display !== 'none';
  const name = document.getElementById('modal-task-name').value.trim();
  const priority = document.getElementById('modal-priority').value;
  if (nameVisible && !name) return;
  if (!tasks[selectedDate]) tasks[selectedDate]=[];
  if (editingTaskId) {
    const f=findTask(editingTaskId);
    if(f){
      if(nameVisible){f.task.name=name; f.task.priority=priority;}
      f.task.attachments=[...(f.task.attachments||[]),...pendingAttachments];
    }
  } else {
    tasks[selectedDate].push({id:genId(),name,priority,done:false,attachments:[...pendingAttachments]});
  }
  document.getElementById('add-task-input').value='';
  saveTasks(); renderCalendar(); renderTasks();
  document.getElementById('task-modal').classList.remove('open');
  resetModal();
}
document.getElementById('modal-save').addEventListener('click', saveTaskFromModal);

// ── FILE ATTACH ──
document.getElementById('modal-file-input').addEventListener('change', e => {
  Array.from(e.target.files).forEach(file => {
    const r=new FileReader();
    r.onload=ev=>{pendingAttachments.push({name:file.name,type:file.type,dataUrl:ev.target.result}); renderModalPreviews();};
    r.readAsDataURL(file);
  });
  e.target.value='';
});
function renderModalPreviews() {
  const c=document.getElementById('modal-attach-previews'); c.innerHTML='';
  pendingAttachments.forEach((att,i)=>{
    if(att.type.startsWith('image/')){
      const w=document.createElement('div'); w.className='attach-preview';
      w.innerHTML=`<img src="${att.dataUrl}"/><button class="remove-attach" data-i="${i}">✕</button>`;
      c.appendChild(w);
    } else {
      const w=document.createElement('div'); w.className='attach-file-item';
      w.innerHTML=`📄 ${escHtml(att.name)} <button data-i="${i}">✕</button>`; c.appendChild(w);
    }
  });
  c.querySelectorAll('[data-i]').forEach(btn=>btn.addEventListener('click',()=>{pendingAttachments.splice(+btn.dataset.i,1); renderModalPreviews();}));
}

// ── ATTACH TO EXISTING ──
function openAttachModal(id) {
  resetModal();
  document.getElementById('fg-name').style.display='none';
  document.getElementById('fg-priority').style.display='none';
  document.getElementById('modal-title').textContent='Add Attachments';
  editingTaskId=id;
  document.getElementById('task-modal').classList.add('open');
}

// ── VIEW ATTACHMENTS ──
function openViewAttachModal(id) {
  const f=findTask(id); if(!f) return;
  const g=document.getElementById('attach-gallery'); g.innerHTML='';
  (f.task.attachments||[]).forEach(att=>{
    const el=document.createElement('div'); el.className='attach-gallery-item';
    if(att.type.startsWith('image/')) el.innerHTML=`<img src="${att.dataUrl}"/>`;
    else el.innerHTML=`<div class="file-label">📄 ${escHtml(att.name)}</div>`;
    g.appendChild(el);
  });
  document.getElementById('attach-modal').classList.add('open');
}
document.getElementById('attach-close').addEventListener('click',()=>document.getElementById('attach-modal').classList.remove('open'));

// ── MOVE MODAL ──
function openMoveModal(id) {
  moveTaskId=id; moveViewYear=today.getFullYear(); moveViewMonth=today.getMonth(); moveSelectedDate=null;
  renderMoveCalendar(); document.getElementById('move-modal').classList.add('open');
}
function renderMoveCalendar() {
  document.getElementById('move-month-label').textContent=`${MONTHS[moveViewMonth]} ${moveViewYear}`;
  const grid=document.getElementById('move-cal-grid'); grid.innerHTML='';
  SHORT_DAYS.forEach(d=>{const el=document.createElement('div');el.className='move-cal-dow';el.textContent=d;grid.appendChild(el);});
  const first=new Date(moveViewYear,moveViewMonth,1).getDay();
  const dim=new Date(moveViewYear,moveViewMonth+1,0).getDate();
  const tk=dateKey(today);
  for(let i=0;i<first;i++){const el=document.createElement('div');grid.appendChild(el);}
  for(let d=1;d<=dim;d++){
    const el=document.createElement('div'); el.className='move-cal-day'; el.textContent=d;
    const key=`${moveViewYear}-${String(moveViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(key<tk) el.classList.add('disabled');
    if(key===moveSelectedDate) el.classList.add('selected-move');
    el.addEventListener('click',()=>{if(key<tk)return; moveSelectedDate=key; renderMoveCalendar();});
    grid.appendChild(el);
  }
}
document.getElementById('move-prev').addEventListener('click',()=>{moveViewMonth--;if(moveViewMonth<0){moveViewMonth=11;moveViewYear--;}renderMoveCalendar();});
document.getElementById('move-next').addEventListener('click',()=>{moveViewMonth++;if(moveViewMonth>11){moveViewMonth=0;moveViewYear++;}renderMoveCalendar();});
document.getElementById('move-cancel').addEventListener('click',()=>document.getElementById('move-modal').classList.remove('open'));
document.getElementById('move-confirm').addEventListener('click',()=>{
  if(!moveSelectedDate||!moveTaskId) return;
  const f=findTask(moveTaskId); if(!f) return;
  if(f.key===moveSelectedDate){document.getElementById('move-modal').classList.remove('open');return;}
  if(!tasks[moveSelectedDate]) tasks[moveSelectedDate]=[];
  tasks[moveSelectedDate].push({...f.task});
  tasks[f.key].splice(f.idx,1);
  saveTasks(); renderCalendar(); renderTasks();
  document.getElementById('move-modal').classList.remove('open');
});

// ── CLOSE ON OVERLAY TAP ──
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{
    if(e.target===o){o.classList.remove('open'); if(o.id==='task-modal') resetModal();}
  });
});

// ── INIT ──
renderCalendar(); renderTasks(); updateDateHeader();
</script>
</body>
</html>
