<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ff;
    --card: #ffffff;
    --primary: #5b4ef8;
    --primary-light: #ede9ff;
    --primary-mid: #c4b8ff;
    --accent: #ff6b6b;
    --green: #22c55e;
    --text: #1a1830;
    --muted: #8b87a8;
    --border: #e8e5f7;
    --shadow: 0 4px 24px rgba(91,78,248,0.10);
    --radius: 16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 24px;
  }
  .app {
    width: 100%;
    max-width: 960px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 28px;
    align-items: start;
  }
  /* CALENDAR */
  .calendar-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 20px 20px;
    position: sticky;
    top: 40px;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .cal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    color: var(--text);
  }
  .cal-title span { color: var(--primary); }
  .cal-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn {
    width: 32px; height: 32px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 1rem;
    transition: all .15s;
  }
  .nav-btn:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary-mid); }
  .today-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
    transition: all .15s;
  }
  .today-btn:hover { background: var(--primary-light); border-color: var(--primary-mid); color: var(--primary); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-dow {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding-bottom: 10px;
  }
  .cal-day {
    text-align: center;
    padding: 6px 2px;
    font-size: 0.88rem;
    font-weight: 400;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    position: relative;
    transition: all .15s;
    user-select: none;
  }
  .cal-day:hover { background: var(--primary-light); color: var(--primary); }
  .cal-day.other-month { color: #ccc; }
  .cal-day.selected {
    background: var(--primary);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(91,78,248,0.35);
  }
  .cal-day.has-tasks::after {
    content: '';
    display: block;
    width: 4px; height: 4px;
    background: var(--primary);
    border-radius: 50%;
    margin: 2px auto 0;
  }
  .cal-day.selected.has-tasks::after { background: rgba(255,255,255,0.7); }

  /* TASK SECTION */
  .task-section { }
  .task-date-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 14px;
    padding: 0 2px;
  }
  .task-date-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--text);
  }
  .task-today-badge {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--primary);
    font-style: italic;
  }

  .add-task-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
  }
  .add-task-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--card);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 0 14px;
    box-shadow: 0 2px 8px rgba(91,78,248,0.06);
    transition: border-color .15s;
  }
  .add-task-wrap:focus-within { border-color: var(--primary-mid); }
  .add-task-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: transparent;
    padding: 13px 0;
  }
  .add-task-input::placeholder { color: var(--muted); }
  .dot-btn {
    width: 14px; height: 14px;
    background: var(--primary);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity .15s;
  }
  .dot-btn:hover { opacity: 1; }
  .add-btn {
    width: 46px; height: 46px;
    background: var(--primary);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(91,78,248,0.35);
    transition: transform .15s, box-shadow .15s;
    flex-shrink: 0;
  }
  .add-btn:hover { transform: scale(1.06); box-shadow: 0 6px 18px rgba(91,78,248,0.4); }

  .filter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .filter-tabs {
    display: flex;
    gap: 6px;
  }
  .filter-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all .15s;
  }
  .filter-tab.active {
    background: var(--primary-light);
    color: var(--primary);
  }
  .filter-tab:hover:not(.active) { background: var(--border); color: var(--text); }
  .clear-btn {
    font-size: 0.8rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color .15s;
  }
  .clear-btn:hover { color: var(--accent); }

  /* TASKS */
  .tasks-list { display: flex; flex-direction: column; gap: 5px; }
  .task-item {
    background: var(--card);
    border-radius: 10px;
    padding: 7px 12px;
    box-shadow: 0 2px 10px rgba(91,78,248,0.07);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: box-shadow .15s, opacity .2s;
    position: relative;
  }
  .task-item.done { opacity: 0.55; }
  .task-item.done .task-name { text-decoration: line-through; color: var(--muted); }
  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
    font-size: 0.7rem;
  }
  .check-btn.checked {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .check-btn:not(.checked):hover { border-color: var(--green); background: #dcfce7; }
  .task-body { flex: 1; min-width: 0; }
  .task-name {
    font-size: 0.86rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .priority-badge {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 5px;
  }
  .priority-badge.low { background: #e0f2fe; color: #0369a1; }
  .priority-badge.medium { background: #fef9c3; color: #a16207; }
  .priority-badge.high { background: #fee2e2; color: #dc2626; }
  .task-attachments-count {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex; align-items: center; gap: 3px;
  }
  .task-due {
    font-size: 0.72rem;
    color: var(--muted);
  }
  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    color: var(--muted);
    transition: all .15s;
  }
  .icon-btn:hover { background: var(--primary-light); color: var(--primary); }
  .icon-btn.delete:hover { background: #fee2e2; color: var(--accent); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,24,48,0.35);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(91,78,248,0.2);
    transform: translateY(20px) scale(0.97);
    transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--text);
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-input, .form-select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--primary-mid); }

  .attach-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.85rem;
    transition: all .15s;
    background: var(--bg);
  }
  .attach-zone:hover { border-color: var(--primary-mid); color: var(--primary); background: var(--primary-light); }
  .attach-zone input { display: none; }
  .attach-previews {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .attach-preview {
    position: relative;
    width: 60px; height: 60px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--border);
    border: 1.5px solid var(--border);
  }
  .attach-preview img { width: 100%; height: 100%; object-fit: cover; }
  .attach-preview .remove-attach {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 0.6rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .attach-file-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.78rem;
    color: var(--text);
  }
  .attach-file-item button {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 0.75rem;
  }
  .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-cancel {
    flex: 1;
    padding: 11px;
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .btn-cancel:hover { background: var(--bg); }
  .btn-primary {
    flex: 2;
    padding: 11px;
    border: none;
    background: var(--primary);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(91,78,248,0.3);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-primary:hover { transform: scale(1.02); box-shadow: 0 6px 18px rgba(91,78,248,0.4); }

  /* Move modal */
  .move-cal {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-top: 8px;
  }
  .move-cal-day {
    text-align: center;
    padding: 7px 2px;
    font-size: 0.82rem;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
    border: 1.5px solid transparent;
    transition: all .15s;
  }
  .move-cal-day:hover:not(.disabled) { background: var(--primary-light); color: var(--primary); }
  .move-cal-day.disabled { color: #d0cedf; pointer-events: none; }
  .move-cal-day.selected-move { background: var(--primary); color: #fff; border-color: var(--primary); }
  .move-cal-dow { text-align: center; font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 6px; }

  /* Attachments view modal */
  .attach-gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }
  .attach-gallery-item {
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg);
    border: 1.5px solid var(--border);
  }
  .attach-gallery-item img { display: block; max-width: 160px; max-height: 140px; object-fit: cover; }
  .attach-gallery-item .file-label {
    padding: 8px 12px;
    font-size: 0.8rem;
    color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
    font-size: 0.9rem;
    background: var(--card);
    border-radius: 14px;
    border: 1.5px dashed var(--border);
  }
  .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 8px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .task-item { animation: fadeIn .2s ease; }

  .calendar-col { min-width: 0; }
  .task-col { min-width: 0; }

  @media (max-width: 680px) {
    .app { grid-template-columns: 1fr; gap: 18px; }
    .calendar-card { position: static; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- LEFT: CALENDAR -->
  <div class="calendar-col">
  <div class="calendar-card">
    <div class="cal-header">
      <button class="nav-btn" id="prev-month">&#8249;</button>
      <h2 class="cal-title" id="cal-title"></h2>
      <div class="cal-nav">
        <button class="today-btn" id="go-today">Today</button>
        <button class="nav-btn" id="next-month">&#8250;</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  </div><!-- /calendar-col -->

  <!-- RIGHT: TASK SECTION -->
  <div class="task-col">
  <div class="task-section">
    <div class="task-date-header">
      <span class="task-date-label" id="task-date-label"></span>
      <span class="task-today-badge" id="today-badge" style="display:none">— Today</span>
    </div>
    <div class="add-task-row">
      <div class="add-task-wrap">
        <input class="add-task-input" id="add-task-input" placeholder="Add a task for this day…" />
        <button class="dot-btn"></button>
      </div>
      <button class="add-btn" id="open-add-modal">+</button>
    </div>
    <div class="filter-row">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="active">Active</button>
        <button class="filter-tab" data-filter="done">Done</button>
      </div>
      <button class="clear-btn" id="clear-done-btn">Clear done</button>
    </div>
    <div class="tasks-list" id="tasks-list"></div>
  </div>
  </div><!-- /task-col -->
</div>

<!-- ADD / EDIT TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Task</div>
    <div class="form-group">
      <label class="form-label">Task name</label>
      <input class="form-input" id="modal-task-name" placeholder="What needs to be done?" />
    </div>
    <div class="form-group">
      <label class="form-label">Priority</label>
      <select class="form-select" id="modal-priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Attachments</label>
      <label class="attach-zone">
        <input type="file" id="modal-file-input" multiple accept="image/*,application/pdf,.doc,.docx,.txt" />
        📎 Click to attach files or screenshots
      </label>
      <div class="attach-previews" id="modal-attach-previews"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-save">Save Task</button>
    </div>
  </div>
</div>

<!-- MOVE TASK MODAL -->
<div class="modal-overlay" id="move-modal">
  <div class="modal">
    <div class="modal-title">Move Task to…</div>
    <div class="form-group" style="margin-bottom:0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button class="nav-btn" id="move-prev">&#8249;</button>
        <span style="font-weight:600;color:var(--text)" id="move-month-label"></span>
        <button class="nav-btn" id="move-next">&#8250;</button>
      </div>
      <div class="move-cal" id="move-cal-grid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="move-cancel">Cancel</button>
      <button class="btn-primary" id="move-confirm">Move Task</button>
    </div>
  </div>
</div>

<!-- ATTACHMENTS VIEW MODAL -->
<div class="modal-overlay" id="attach-modal">
  <div class="modal">
    <div class="modal-title">Attachments</div>
    <div class="attach-gallery" id="attach-gallery"></div>
    <div class="modal-footer">
      <button class="btn-primary" id="attach-close" style="flex:1">Close</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SHORT_DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

let today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let selectedDate = dateKey(today);
let tasks = JSON.parse(localStorage.getItem('cal_tasks') || '{}');
let filterMode = 'all';
let editingTaskId = null;
let modalAttachments = []; // {name, type, dataUrl}
let moveTaskId = null;
let moveViewYear = today.getFullYear();
let moveViewMonth = today.getMonth();
let moveSelectedDate = null;

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function saveTasks() { localStorage.setItem('cal_tasks', JSON.stringify(tasks)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ---- CALENDAR ----
function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  document.getElementById('cal-title').innerHTML = `${MONTHS[viewMonth]} <span>${viewYear}</span>`;
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  const first = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevDays - first + 1 + i;
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    const key = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (key === selectedDate) el.classList.add('selected');
    if (key === dateKey(today)) el.classList.add('today');
    if (tasks[key] && tasks[key].length > 0) el.classList.add('has-tasks');
    el.addEventListener('click', () => {
      selectedDate = key;
      renderCalendar();
      renderTasks();
      updateDateHeader();
    });
    grid.appendChild(el);
  }
  const remaining = 42 - first - daysInMonth;
  for (let i = 1; i <= remaining; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = i;
    grid.appendChild(el);
  }
}

function updateDateHeader() {
  const parts = selectedDate.split('-');
  const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  const weekDay = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const monthName = MONTHS[d.getMonth()].slice(0,3);
  document.getElementById('task-date-label').textContent = `${weekDay}, ${monthName} ${d.getDate()}`;
  document.getElementById('today-badge').style.display = selectedDate === dateKey(today) ? '' : 'none';
}

// ---- TASKS ----
function getFilteredTasks() {
  const list = tasks[selectedDate] || [];
  if (filterMode === 'active') return list.filter(t => !t.done);
  if (filterMode === 'done') return list.filter(t => t.done);
  return list;
}

function renderTasks() {
  const container = document.getElementById('tasks-list');
  container.innerHTML = '';
  const list = getFilteredTasks();
  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><span class="emoji">✨</span>No tasks for this day</div>`;
    return;
  }
  list.forEach(task => {
    const el = document.createElement('div');
    el.className = 'task-item' + (task.done ? ' done' : '');
    el.innerHTML = `
      <button class="check-btn ${task.done ? 'checked' : ''}" data-id="${task.id}" title="Mark done">
        ${task.done ? '✓' : ''}
      </button>
      <div class="task-body">
        <div class="task-name">${escHtml(task.name)}</div>
        <div class="task-meta">
          <span class="priority-badge ${task.priority}">${task.priority.toUpperCase()}</span>
          ${task.attachments && task.attachments.length ? `<span class="task-attachments-count">📎 ${task.attachments.length}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        ${task.attachments && task.attachments.length ? `<button class="icon-btn" data-action="view-attach" data-id="${task.id}" title="View attachments">📎</button>` : ''}
        <button class="icon-btn" data-action="attach" data-id="${task.id}" title="Add attachments">🖇️</button>
        <button class="icon-btn" data-action="move" data-id="${task.id}" title="Move to date">📅</button>
        <button class="icon-btn delete" data-action="delete" data-id="${task.id}" title="Delete">✕</button>
      </div>
    `;
    container.appendChild(el);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function findTask(id) {
  for (const key in tasks) {
    const idx = tasks[key].findIndex(t => t.id === id);
    if (idx !== -1) return { key, idx, task: tasks[key][idx] };
  }
  return null;
}

// ---- EVENT DELEGATION ----
document.getElementById('tasks-list').addEventListener('click', e => {
  const checkBtn = e.target.closest('.check-btn');
  const iconBtn = e.target.closest('.icon-btn[data-action]');
  if (checkBtn) {
    const id = checkBtn.dataset.id;
    const found = findTask(id);
    if (found) { found.task.done = !found.task.done; saveTasks(); renderCalendar(); renderTasks(); }
  }
  if (iconBtn) {
    const id = iconBtn.dataset.id;
    const action = iconBtn.dataset.action;
    if (action === 'delete') {
      const found = findTask(id);
      if (found) { tasks[found.key].splice(found.idx, 1); saveTasks(); renderCalendar(); renderTasks(); }
    }
    if (action === 'move') openMoveModal(id);
    if (action === 'attach') openAttachModal(id);
    if (action === 'view-attach') openViewAttachModal(id);
  }
});

// ---- FILTER TABS ----
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterMode = btn.dataset.filter;
    renderTasks();
  });
});
document.getElementById('clear-done-btn').addEventListener('click', () => {
  if (tasks[selectedDate]) { tasks[selectedDate] = tasks[selectedDate].filter(t => !t.done); saveTasks(); renderCalendar(); renderTasks(); }
});

// ---- CALENDAR NAV ----
document.getElementById('prev-month').addEventListener('click', () => {
  viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar();
});
document.getElementById('next-month').addEventListener('click', () => {
  viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar();
});
document.getElementById('go-today').addEventListener('click', () => {
  viewYear = today.getFullYear(); viewMonth = today.getMonth();
  selectedDate = dateKey(today);
  renderCalendar(); renderTasks(); updateDateHeader();
});

// ---- ADD TASK MODAL ----
let pendingAttachments = [];

function openAddModal(prefillName = '') {
  editingTaskId = null;
  pendingAttachments = [];
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('modal-task-name').value = prefillName;
  document.getElementById('modal-priority').value = 'low';
  document.getElementById('modal-attach-previews').innerHTML = '';
  document.getElementById('task-modal').classList.add('open');
}
document.getElementById('open-add-modal').addEventListener('click', () => {
  const val = document.getElementById('add-task-input').value.trim();
  openAddModal(val);
});
document.getElementById('add-task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { const val = e.target.value.trim(); if (val) openAddModal(val); }
});
document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('task-modal').classList.remove('open');
});
document.getElementById('modal-save').addEventListener('click', saveTaskFromModal);

function saveTaskFromModal() {
  const name = document.getElementById('modal-task-name').value.trim();
  if (!name) return;
  const priority = document.getElementById('modal-priority').value;
  if (!tasks[selectedDate]) tasks[selectedDate] = [];
  if (editingTaskId) {
    const found = findTask(editingTaskId);
    if (found) {
      found.task.name = name;
      found.task.priority = priority;
      found.task.attachments = [...(found.task.attachments || []), ...pendingAttachments];
    }
  } else {
    tasks[selectedDate].push({ id: genId(), name, priority, done: false, attachments: [...pendingAttachments] });
  }
  document.getElementById('add-task-input').value = '';
  pendingAttachments = [];
  saveTasks(); renderCalendar(); renderTasks();
  document.getElementById('task-modal').classList.remove('open');
}

// ---- FILE ATTACHMENTS ----
document.getElementById('modal-file-input').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const att = { name: file.name, type: file.type, dataUrl: ev.target.result };
      pendingAttachments.push(att);
      renderModalPreviews();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

function renderModalPreviews() {
  const container = document.getElementById('modal-attach-previews');
  container.innerHTML = '';
  pendingAttachments.forEach((att, i) => {
    if (att.type.startsWith('image/')) {
      const wrap = document.createElement('div');
      wrap.className = 'attach-preview';
      wrap.innerHTML = `<img src="${att.dataUrl}" /><button class="remove-attach" data-i="${i}">✕</button>`;
      container.appendChild(wrap);
    } else {
      const wrap = document.createElement('div');
      wrap.className = 'attach-file-item';
      wrap.innerHTML = `📄 ${escHtml(att.name)} <button data-i="${i}">✕</button>`;
      container.appendChild(wrap);
    }
  });
  container.querySelectorAll('[data-i]').forEach(btn => {
    btn.addEventListener('click', () => {
      pendingAttachments.splice(+btn.dataset.i, 1);
      renderModalPreviews();
    });
  });
}

// ---- ATTACH TO EXISTING TASK ----
let attachTargetId = null;
function openAttachModal(id) {
  attachTargetId = id;
  pendingAttachments = [];
  document.getElementById('modal-attach-previews').innerHTML = '';
  document.getElementById('modal-task-name').value = '';
  document.getElementById('modal-title').textContent = 'Add Attachments';
  editingTaskId = id;
  // show only attachment section
  document.querySelectorAll('.form-group').forEach((el, i) => el.style.display = i === 2 ? '' : 'none');
  document.getElementById('task-modal').classList.add('open');
}
// Restore on close
document.getElementById('modal-cancel').addEventListener('click', () => {
  document.querySelectorAll('.form-group').forEach(el => el.style.display = '');
  document.getElementById('modal-title').textContent = 'New Task';
  editingTaskId = null;
});
// Override save for attach-only
function saveTaskFromModal() {
  const allVisible = document.querySelectorAll('.form-group:not([style*="none"])').length === 3;
  const name = document.getElementById('modal-task-name').value.trim();
  const priority = document.getElementById('modal-priority').value;
  if (allVisible && !name) return;
  if (!tasks[selectedDate]) tasks[selectedDate] = [];
  if (editingTaskId) {
    const found = findTask(editingTaskId);
    if (found) {
      if (allVisible) { found.task.name = name; found.task.priority = priority; }
      found.task.attachments = [...(found.task.attachments || []), ...pendingAttachments];
    }
  } else {
    tasks[selectedDate].push({ id: genId(), name, priority, done: false, attachments: [...pendingAttachments] });
  }
  document.getElementById('add-task-input').value = '';
  pendingAttachments = [];
  document.querySelectorAll('.form-group').forEach(el => el.style.display = '');
  document.getElementById('modal-title').textContent = 'New Task';
  editingTaskId = null;
  saveTasks(); renderCalendar(); renderTasks();
  document.getElementById('task-modal').classList.remove('open');
}
document.getElementById('modal-save').addEventListener('click', saveTaskFromModal);

// ---- VIEW ATTACHMENTS MODAL ----
function openViewAttachModal(id) {
  const found = findTask(id);
  if (!found) return;
  const gallery = document.getElementById('attach-gallery');
  gallery.innerHTML = '';
  (found.task.attachments || []).forEach(att => {
    const el = document.createElement('div');
    el.className = 'attach-gallery-item';
    if (att.type.startsWith('image/')) {
      el.innerHTML = `<img src="${att.dataUrl}" />`;
    } else {
      el.innerHTML = `<div class="file-label">📄 ${escHtml(att.name)}</div>`;
    }
    gallery.appendChild(el);
  });
  document.getElementById('attach-modal').classList.add('open');
}
document.getElementById('attach-close').addEventListener('click', () => {
  document.getElementById('attach-modal').classList.remove('open');
});

// ---- MOVE MODAL ----
function openMoveModal(id) {
  moveTaskId = id;
  moveViewYear = today.getFullYear();
  moveViewMonth = today.getMonth();
  moveSelectedDate = null;
  renderMoveCalendar();
  document.getElementById('move-modal').classList.add('open');
}

function renderMoveCalendar() {
  document.getElementById('move-month-label').textContent = `${MONTHS[moveViewMonth]} ${moveViewYear}`;
  const grid = document.getElementById('move-cal-grid');
  grid.innerHTML = '';
  SHORT_DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'move-cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  const first = new Date(moveViewYear, moveViewMonth, 1).getDay();
  const daysInMonth = new Date(moveViewYear, moveViewMonth+1, 0).getDate();
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div'); grid.appendChild(el);
  }
  const todayKey = dateKey(today);
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'move-cal-day';
    el.textContent = d;
    const key = `${moveViewYear}-${String(moveViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (key < todayKey) el.classList.add('disabled');
    if (key === moveSelectedDate) el.classList.add('selected-move');
    el.addEventListener('click', () => {
      if (key < todayKey) return;
      moveSelectedDate = key;
      renderMoveCalendar();
    });
    grid.appendChild(el);
  }
}

document.getElementById('move-prev').addEventListener('click', () => {
  moveViewMonth--; if (moveViewMonth < 0) { moveViewMonth = 11; moveViewYear--; } renderMoveCalendar();
});
document.getElementById('move-next').addEventListener('click', () => {
  moveViewMonth++; if (moveViewMonth > 11) { moveViewMonth = 0; moveViewYear++; } renderMoveCalendar();
});
document.getElementById('move-cancel').addEventListener('click', () => {
  document.getElementById('move-modal').classList.remove('open');
});
document.getElementById('move-confirm').addEventListener('click', () => {
  if (!moveSelectedDate || !moveTaskId) return;
  const found = findTask(moveTaskId);
  if (!found) return;
  if (found.key === moveSelectedDate) { document.getElementById('move-modal').classList.remove('open'); return; }
  if (!tasks[moveSelectedDate]) tasks[moveSelectedDate] = [];
  tasks[moveSelectedDate].push({ ...found.task });
  tasks[found.key].splice(found.idx, 1);
  saveTasks(); renderCalendar(); renderTasks();
  document.getElementById('move-modal').classList.remove('open');
});

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('open');
      document.querySelectorAll('.form-group').forEach(el => el.style.display = '');
      document.getElementById('modal-title').textContent = 'New Task';
      editingTaskId = null;
    }
  });
});

// ---- INIT ----
renderCalendar();
renderTasks();
updateDateHeader();
</script>
</body>
</html>
